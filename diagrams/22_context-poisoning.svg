    <rect x="120" y="200" width="40" height="40"></rect><rect x="160" y="200" width="40" height="40"></rect><rect x="240" y="200" width="40" height="40"></rect><rect x="280" y="200" width="40" height="40"></rect><rect x="360" y="200" width="40" height="40"></rect><rect x="400" y="200" width="40" height="40"></rect><rect x="440" y="200" width="40" height="40"></rect><rect x="520" y="200" width="40" height="40"></rect><rect x="560" y="200" width="40" height="40"></rect><rect x="600" y="200" width="40" height="40"></rect><rect x="640" y="200" width="40" height="40"></rect>
  </g>
  
  <rect x="200" y="200" width="40" height="40" class="stroke-main" stroke-width="2" style="fill:none" stroke-dasharray="4,4"></rect>
  <rect x="320" y="200" width="40" height="40" class="stroke-main" stroke-width="2" style="fill:none" stroke-dasharray="4,4"></rect>

  <text x="400" y="38" text-anchor="middle" font-size="13" font-weight="700">same window size — different failure</text>

  
  <text x="120" y="82" font-size="11">window full</text>
  <g class="stroke-main" stroke-width="1" style="fill:none">
    <rect x="120" y="90" width="40" height="40"></rect><rect x="160" y="90" width="40" height="40"></rect><rect x="200" y="90" width="40" height="40"></rect><rect x="240" y="90" width="40" height="40"></rect><rect x="280" y="90" width="40" height="40"></rect><rect x="320" y="90" width="40" height="40"></rect><rect x="360" y="90" width="40" height="40"></rect><rect x="400" y="90" width="40" height="40"></rect><rect x="440" y="90" width="40" height="40"></rect><rect x="480" y="90" width="40" height="40"></rect><rect x="520" y="90" width="40" height="40"></rect><rect x="560" y="90" width="40" height="40"></rect><rect x="600" y="90" width="40" height="40"></rect><rect x="640" y="90" width="40" height="40"></rect>

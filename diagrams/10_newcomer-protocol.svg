<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    text { font-family: 'IBM Plex Mono', monospace; }
    text, .stroke-main { fill: #1a1a1a; stroke: #1a1a1a; }
    text { stroke-width: 0; }
  </style>
  <defs>
    <marker id="aAmber" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"></path></marker>
    <marker id="aIndigo" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6366f1"></path></marker>
    <marker id="aMain" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" class="stroke-main" stroke-width="0"></path></marker>
  </defs>

  
  <rect x="0" y="0" width="800" height="400" rx="2" fill="#faf9f6"></rect>

  <text x="400" y="36" text-anchor="middle" font-size="13" font-weight="700">one protocol, two contracts</text>

  
  <line x1="400" y1="64" x2="400" y2="360" class="stroke-main" stroke-width="1" style="fill:none"></line>
  <text x="400" y="80" text-anchor="middle" font-size="13" font-weight="700">Network</text>

  
  <rect x="70" y="150" width="120" height="46" rx="2" stroke="#f59e0b" stroke-width="2" fill="none"></rect>
  <text x="130" y="178" text-anchor="middle" font-size="13">Human</text>
  <rect x="610" y="150" width="120" height="46" rx="2" stroke="#6366f1" stroke-width="2" fill="none"></rect>
  <text x="670" y="178" text-anchor="middle" font-size="13">Agent</text>

  
  <text x="265" y="135" text-anchor="middle" font-size="11">provides context</text>
  <line x1="392" y1="146" x2="192" y2="160" class="stroke-main" stroke-width="2" style="fill:none" marker-end="url(#aMain)"></line>
  <text x="535" y="135" text-anchor="middle" font-size="11">provides context</text>
  <line x1="408" y1="146" x2="608" y2="160" class="stroke-main" stroke-width="2" style="fill:none" marker-end="url(#aMain)"></line>

  
  <text x="265" y="232" text-anchor="middle" font-size="11">accepts / stake held</text>
  <line x1="192" y1="190" x2="396" y2="248" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#aAmber)"></line>

  
  <text x="540" y="232" text-anchor="middle" font-size="11">no stake / resets</text>
  <line x1="608" y1="190" x2="472" y2="229" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#aIndigo)"></line>

  
  <text x="555" y="330" text-anchor="middle" font-size="11">held on its behalf</text>
  <path d="M404,300 C470,338 580,318 660,202" class="stroke-main" stroke-width="2" style="fill:none" marker-end="url(#aMain)"></path>
</svg>

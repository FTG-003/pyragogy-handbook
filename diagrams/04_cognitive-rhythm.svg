<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    text { font-family: 'IBM Plex Mono', monospace; }
    text, .stroke-main { fill: #1a1a1a; stroke: #1a1a1a; }
    text { stroke-width: 0; }
  </style>
  <defs>
    <marker id="aAmber" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"></path></marker>
    <marker id="aIndigo" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6366f1"></path></marker>
    <marker id="aMain" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" class="stroke-main" stroke-width="0"></path></marker>
  </defs>

  
  <rect x="0" y="0" width="800" height="400" rx="2" fill="#faf9f6"></rect>

  <text x="400" y="36" text-anchor="middle" font-size="13" font-weight="700">two cycles, different speed</text>

  
  
  <line x1="300" y1="118" x2="300" y2="282" class="stroke-main" stroke-width="1" style="fill:none"></line>
  <line x1="470" y1="118" x2="470" y2="282" class="stroke-main" stroke-width="1" style="fill:none"></line>

  
  <text x="80" y="135" font-size="12" fill="#f59e0b">Human</text>
  <rect x="120" y="142" width="180" height="40" rx="2" stroke="#f59e0b" stroke-width="2" fill="none"></rect>
  <text x="210" y="167" text-anchor="middle" font-size="12">process</text>
  <rect x="300" y="142" width="170" height="40" rx="2" stroke="#f59e0b" stroke-width="2" fill="none"></rect>
  <text x="385" y="167" text-anchor="middle" font-size="12">friction</text>
  <rect x="470" y="142" width="90" height="40" rx="2" stroke="#f59e0b" stroke-width="2" fill="none"></rect>
  <text x="515" y="167" text-anchor="middle" font-size="12">express</text>

  
  <text x="80" y="235" font-size="12" fill="#6366f1">Agent</text>
  <rect x="120" y="218" width="70" height="40" rx="2" stroke="#6366f1" stroke-width="2" fill="none"></rect>
  <text x="155" y="243" text-anchor="middle" font-size="12">process</text>
  <rect x="190" y="218" width="160" height="40" rx="2" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,4" fill="none"></rect>
  <text x="270" y="243" text-anchor="middle" font-size="11">no friction</text>
  <rect x="350" y="218" width="290" height="40" rx="2" stroke="#6366f1" stroke-width="2" fill="none"></rect>
  <text x="495" y="243" text-anchor="middle" font-size="12">express</text>

  
  <text x="400" y="205" text-anchor="middle" font-size="12" font-weight="700">phases out of sync</text>

  
  <line x1="385" y1="142" x2="385" y2="118" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#aAmber)"></line>
  <text x="400" y="332" text-anchor="middle" font-size="11">friction only on human side</text>
</svg>

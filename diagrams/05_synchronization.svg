<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    text { font-family: 'IBM Plex Mono', monospace; }
    text, .stroke-main { fill: #1a1a1a; stroke: #1a1a1a; }
    text { stroke-width: 0; }
  </style>
  <defs>
    <marker id="aMain" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" class="stroke-main" stroke-width="0"></path></marker>
  </defs>

  
  <rect x="0" y="0" width="800" height="400" rx="2" fill="#faf9f6"></rect>

  <text x="400" y="40" text-anchor="middle" font-size="13" font-weight="700">intermittent alignment, not locked phase</text>

  
  <line x1="50" y1="200" x2="750" y2="200" class="stroke-main" stroke-width="1" style="fill:none" opacity="0.25"></line>
  <line x1="200" y1="70" x2="200" y2="330" class="stroke-main" stroke-width="1" style="fill:none" opacity="0.15"></line>
  <line x1="350" y1="70" x2="350" y2="330" class="stroke-main" stroke-width="1" style="fill:none" opacity="0.15"></line>
  <line x1="620" y1="70" x2="620" y2="330" class="stroke-main" stroke-width="1" style="fill:none" opacity="0.15"></line>

  
  <line x1="480" y1="80" x2="480" y2="330" class="stroke-main" stroke-width="1" style="fill:none" stroke-dasharray="2,3"></line>
  <text x="480" y="350" text-anchor="middle" font-size="11">reset</text>

  
  <polyline points="60,150 130,235 200,200 270,150 350,200 420,150 480,185 540,250 620,200 690,160 740,175" fill="none" stroke="#f59e0b" stroke-width="2"></polyline>
  <text x="60" y="135" font-size="12">Human</text>

  
  <polyline points="60,255 130,200 200,200 270,255 350,200 420,255 460,235" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,4"></polyline>
  <polyline points="480,300 540,250 620,200 690,285 740,300" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,4"></polyline>
  <text x="60" y="275" font-size="12">Agent</text>

  
  <circle cx="200" cy="200" r="4" class="stroke-main" stroke-width="0" fill="#1a1a1a"></circle>
  <text x="200" y="185" text-anchor="middle" font-size="11">aligned</text>
  <circle cx="350" cy="200" r="4" fill="#1a1a1a"></circle>
  <text x="350" y="185" text-anchor="middle" font-size="11">aligned</text>
  <circle cx="620" cy="200" r="4" fill="#1a1a1a"></circle>
  <text x="620" y="185" text-anchor="middle" font-size="11">aligned</text>

  <text x="400" y="378" text-anchor="middle" font-size="11">won and lost — not a sustained lock</text>
</svg>

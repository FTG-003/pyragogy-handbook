  </defs>

  
  <rect x="0" y="0" width="800" height="400" rx="2" fill="#faf9f6"></rect>

  <text x="400" y="28" text-anchor="middle" font-size="13" font-weight="700">isolated readings — one synthesis</text>

  
  <rect x="36" y="166" width="104" height="48" rx="2" stroke="#f59e0b" stroke-width="2" fill="none"></rect>

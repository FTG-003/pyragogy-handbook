<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    text { font-family: 'IBM Plex Mono', monospace; }
    text, .stroke-main { fill: #1a1a1a; stroke: #1a1a1a; }
    text { stroke-width: 0; }
  </style>
  <defs>
    <marker id="aAmber" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"></path></marker>
    <marker id="aIndigo" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6366f1"></path></marker>
  </defs>

  
  <rect x="0" y="0" width="800" height="400" rx="2" fill="#faf9f6"></rect>

  <text x="400" y="38" text-anchor="middle" font-size="13" font-weight="700">one closed loop, tightening — not two columns</text>

  
  <rect x="350" y="70" width="100" height="38" rx="2" stroke="#6366f1" stroke-width="2" fill="none"></rect>
  <text x="400" y="93" text-anchor="middle" font-size="11">model narrows</text>

  <rect x="600" y="181" width="110" height="38" rx="2" stroke="#f59e0b" stroke-width="2" fill="none"></rect>
  <text x="655" y="204" text-anchor="middle" font-size="11">less pushback</text>

  <rect x="345" y="292" width="110" height="38" rx="2" stroke="#f59e0b" stroke-width="2" fill="none"></rect>
  <text x="400" y="315" text-anchor="middle" font-size="11">human hollows</text>

  <rect x="90" y="181" width="120" height="38" rx="2" stroke="#6366f1" stroke-width="2" fill="none"></rect>
  <text x="150" y="204" text-anchor="middle" font-size="11">thinner input</text>

  
  <path d="M450,96 C560,110 600,150 632,178" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#aIndigo)"></path>
  <path d="M650,219 C600,270 510,295 458,306" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#aAmber)"></path>
  
  <path d="M360,300 C250,285 200,250 175,221" stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#aAmber)"></path>
  <path d="M165,179 C200,140 290,108 348,97" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#aIndigo)"></path>

  <text x="400" y="196" text-anchor="middle" font-size="11" opacity="0.55">the emptier</text>
  <text x="400" y="210" text-anchor="middle" font-size="11" opacity="0.55">return</text>

  <text x="400" y="386" text-anchor="middle" font-size="11">dashed = the conjectured coupling (unverified)</text>
</svg>

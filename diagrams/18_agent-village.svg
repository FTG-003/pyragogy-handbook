  </defs>

  
  <rect x="0" y="0" width="800" height="400" rx="2" fill="#faf9f6"></rect>

  
  <text x="400" y="36" text-anchor="middle" font-size="13" font-weight="700">fluent coordination — wrong frame</text>

  
  <rect x="96" y="72" width="608" height="96" rx="2" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,4" fill="none"></rect>
  <text x="704" y="66" text-anchor="end" font-size="12" fill="#6366f1" stroke-width="0">one machine?</text>

  
  <rect x="120" y="100" width="100" height="40" rx="2" stroke="#6366f1" stroke-width="2" fill="none"></rect>
  <text x="170" y="125" text-anchor="middle" font-size="13">Agent</text>
  <rect x="280" y="100" width="100" height="40" rx="2" stroke="#6366f1" stroke-width="2" fill="none"></rect>
  <text x="330" y="125" text-anchor="middle" font-size="13">Agent</text>
  <rect x="440" y="100" width="100" height="40" rx="2" stroke="#6366f1" stroke-width="2" fill="none"></rect>
  <text x="490" y="125" text-anchor="middle" font-size="13">Agent</text>
  <rect x="600" y="100" width="100" height="40" rx="2" stroke="#6366f1" stroke-width="2" fill="none"></rect>
  <text x="650" y="125" text-anchor="middle" font-size="13">Agent</text>

  
  <line x1="220" y1="120" x2="280" y2="120" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#aIndigo)"></line>
  <line x1="380" y1="120" x2="440" y2="120" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#aIndigo)"></line>
  <line x1="540" y1="120" x2="600" y2="120" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#aIndigo)"></line>

  
  <text x="400" y="208" text-anchor="middle" font-size="13" font-weight="700">frame unchecked</text>

  
  <rect x="120" y="250" width="100" height="40" rx="2" class="stroke-main" stroke-width="2" style="fill:none"></rect>
  <text x="170" y="275" text-anchor="middle" font-size="12">sep. computer</text>
  <rect x="280" y="250" width="100" height="40" rx="2" class="stroke-main" stroke-width="2" style="fill:none"></rect>
  <text x="330" y="275" text-anchor="middle" font-size="12">sep. computer</text>
  <rect x="440" y="250" width="100" height="40" rx="2" class="stroke-main" stroke-width="2" style="fill:none"></rect>
  <text x="490" y="275" text-anchor="middle" font-size="12">sep. computer</text>
  <rect x="600" y="250" width="100" height="40" rx="2" class="stroke-main" stroke-width="2" style="fill:none"></rect>
  <text x="650" y="275" text-anchor="middle" font-size="12">sep. computer</text>

  <text x="400" y="330" text-anchor="middle" font-size="11">no human holds the frame</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    text { font-family: 'IBM Plex Mono', monospace; }
    text, .stroke-main { fill: #1a1a1a; stroke: #1a1a1a; }
    text { stroke-width: 0; }
  </style>
  <defs>
    <marker id="aAmber" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"></path></marker>
    <marker id="aIndigo" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6366f1"></path></marker>
    <marker id="aMain" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" class="stroke-main" stroke-width="0"></path></marker>
  </defs>

  
  <rect x="0" y="0" width="800" height="400" rx="2" fill="#faf9f6"></rect>

  <text x="400" y="34" text-anchor="middle" font-size="13" font-weight="700">order is the discipline</text>

  
  <text x="60" y="92" font-size="11" font-weight="700">in order</text>

  
  <line x1="80" y1="150" x2="720" y2="150" class="stroke-main" stroke-width="1" style="fill:none"></line>

  
  <text x="110" y="135" text-anchor="middle" font-size="12">named call</text>
  <line x1="110" y1="150" x2="110" y2="160" class="stroke-main" stroke-width="2" style="fill:none"></line>
  <line x1="150" y1="150" x2="218" y2="150" class="stroke-main" stroke-width="2" style="fill:none" marker-end="url(#aMain)"></line>

  
  <text x="262" y="135" text-anchor="middle" font-size="12" font-weight="700">hold</text>
  <line x1="262" y1="150" x2="262" y2="160" class="stroke-main" stroke-width="2" style="fill:none"></line>
  <line x1="306" y1="150" x2="374" y2="150" class="stroke-main" stroke-width="2" style="fill:none" marker-end="url(#aMain)"></line>

  
  <text x="418" y="135" text-anchor="middle" font-size="12" font-weight="700">locate</text>
  <line x1="418" y1="150" x2="418" y2="160" class="stroke-main" stroke-width="2" style="fill:none"></line>
  <line x1="462" y1="150" x2="530" y2="150" class="stroke-main" stroke-width="2" style="fill:none" marker-end="url(#aMain)"></line>

  
  <text x="574" y="135" text-anchor="middle" font-size="12" font-weight="700">repair</text>
  <line x1="574" y1="150" x2="574" y2="160" class="stroke-main" stroke-width="2" style="fill:none"></line>
  <line x1="618" y1="150" x2="668" y2="150" class="stroke-main" stroke-width="2" style="fill:none" marker-end="url(#aMain)"></line>

  
  <text x="700" y="135" text-anchor="middle" font-size="12">kept record</text>
  <line x1="700" y1="150" x2="700" y2="160" class="stroke-main" stroke-width="2" style="fill:none"></line>

  
  <text x="262" y="186" text-anchor="middle" font-size="11">jam stays</text>
  <line x1="236" y1="226" x2="254" y2="200" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#aAmber)"></line>
  <line x1="288" y1="226" x2="270" y2="200" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#aIndigo)"></line>
  <text x="218" y="244" text-anchor="middle" font-size="10">Human</text>
  <text x="312" y="244" text-anchor="middle" font-size="10">Agent</text>

  
  <text x="418" y="186" text-anchor="middle" font-size="11">self first</text>
  <path d="M404,200 C384,212 384,232 404,242" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#aAmber)"></path>
  <path d="M432,200 C452,212 452,232 432,242" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#aIndigo)"></path>

  
  <text x="60" y="312" font-size="11" font-weight="700">reversed</text>

  
  <text x="150" y="316" text-anchor="middle" font-size="12">deadlock</text>
  <circle cx="150" cy="345" r="6" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,4" fill="none"></circle>

  
  <text x="430" y="330" text-anchor="middle" font-size="11">override first</text>
  <line x1="160" y1="345" x2="600" y2="345" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#aIndigo)"></line>

  
  <rect x="620" y="327" width="80" height="36" rx="2" class="stroke-main" stroke-width="2" stroke-dasharray="4,4" style="fill:none"></rect>
  <text x="660" y="350" text-anchor="middle" font-size="12">reset</text>

  
  <text x="430" y="372" text-anchor="middle" font-size="10">skips hold + locate</text>
</svg>

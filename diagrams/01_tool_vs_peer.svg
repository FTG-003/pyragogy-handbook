<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    text { font-family: 'IBM Plex Mono', monospace; }
    text, .stroke-main { fill: #1a1a1a; stroke: #1a1a1a; }
    @media (prefers-color-scheme: dark) {
      text, .stroke-main { fill: #f3f4f6; stroke: #f3f4f6; }
    }
    text { stroke-width: 0; }
  </style>
  <defs>
    <marker id="aMain" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" class="stroke-main" stroke-width="0"></path></marker>
    <marker id="aAmber" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"></path></marker>
    <marker id="aIndigo" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6366f1"></path></marker>
  </defs>

  
  <line x1="400" y1="28" x2="400" y2="372" class="stroke-main" stroke-width="1" style="fill:none"></line>

  
  <text x="200" y="34" text-anchor="middle" font-size="15" font-weight="700">AS A TOOL</text>
  <text x="200" y="54" text-anchor="middle" font-size="11">thinking stays on your side</text>

  <rect x="150" y="86" width="100" height="40" rx="2" stroke="#f59e0b" stroke-width="2" fill="none"></rect>
  <text x="200" y="111" text-anchor="middle" font-size="13">Human</text>
  <line x1="200" y1="126" x2="200" y2="166" class="stroke-main" stroke-width="1" style="fill:none" marker-end="url(#aMain)"></line>

  <rect x="150" y="168" width="100" height="40" rx="2" class="stroke-main" stroke-width="2" style="fill:none"></rect>
  <text x="200" y="193" text-anchor="middle" font-size="13">Model</text>
  <line x1="200" y1="208" x2="200" y2="248" class="stroke-main" stroke-width="1" style="fill:none" marker-end="url(#aMain)"></line>

  <rect x="150" y="250" width="100" height="40" rx="2" class="stroke-main" stroke-width="2" style="fill:none"></rect>
  <text x="200" y="275" text-anchor="middle" font-size="13">Output</text>
  <line x1="200" y1="290" x2="200" y2="338" class="stroke-main" stroke-width="1" style="fill:none" marker-end="url(#aMain)"></line>

  <text x="200" y="360" text-anchor="middle" font-size="11">open chain — it exits</text>

  
  <text x="600" y="34" text-anchor="middle" font-size="15" font-weight="700">AS A COGNITIVE PEER</text>
  <text x="600" y="54" text-anchor="middle" font-size="11">it shapes where thinking goes</text>

  
  <rect x="470" y="86" width="260" height="224" rx="2" class="stroke-main" stroke-width="2" stroke-dasharray="4,4" style="fill:none"></rect>

  <rect x="550" y="112" width="100" height="40" rx="2" stroke="#f59e0b" stroke-width="2" fill="none"></rect>
  <text x="600" y="137" text-anchor="middle" font-size="13">Human</text>

  <rect x="550" y="244" width="100" height="40" rx="2" stroke="#6366f1" stroke-width="2" fill="none"></rect>
  <text x="600" y="269" text-anchor="middle" font-size="13">Agent</text>

  
  <path d="M652,134 C710,150 710,246 654,264" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#aAmber)"></path>
  <path d="M548,262 C490,246 490,150 546,134" fill="none" stroke="#6366f1" stroke-width="2" marker-end="url(#aIndigo)"></path>

  <text x="600" y="360" text-anchor="middle" font-size="11">closed loop — it stays</text>
</svg>
